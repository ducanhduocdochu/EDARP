---
- name: Install Docker
  ansible.builtin.include_role:
    name: geerlingguy.docker
  tags: [docker]

- name: Format data volume if needed
  community.general.filesystem:
    fstype: xfs
    dev: "{{ weaviate_data_device }}"
  tags: [storage]

- name: Create data mount directory
  ansible.builtin.file:
    path: "{{ weaviate_data_path }}"
    state: directory
    owner: "1000"
    group: "1000"
    mode: "0755"
  tags: [storage]

- name: Mount data volume
  ansible.posix.mount:
    path: "{{ weaviate_data_path }}"
    src: "{{ weaviate_data_device }}"
    fstype: xfs
    opts: defaults,nofail
    state: mounted
  tags: [storage]

- name: Set ownership on data directory
  ansible.builtin.file:
    path: "{{ weaviate_data_path }}"
    owner: "1000"
    group: "1000"
    recurse: true
  tags: [storage]

- name: Create Weaviate docker-compose directory
  ansible.builtin.file:
    path: /opt/weaviate
    state: directory
    mode: "0755"
  tags: [weaviate]

- name: Deploy Weaviate docker-compose
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: /opt/weaviate/docker-compose.yml
    mode: "0644"
  notify: restart weaviate
  tags: [weaviate]

- name: Start Weaviate container
  community.docker.docker_compose_v2:
    project_src: /opt/weaviate
    state: present
  tags: [weaviate]

- name: Wait for Weaviate to be ready
  ansible.builtin.uri:
    url: "http://localhost:{{ weaviate_port }}/v1/.well-known/ready"
    method: GET
    status_code: 200
  register: weaviate_health
  until: weaviate_health.status == 200
  retries: 30
  delay: 5
  tags: [weaviate, health]

- name: Configure Weaviate backup cron
  ansible.builtin.cron:
    name: "Weaviate S3 backup"
    minute: "0"
    hour: "2"
    job: >-
      curl -sf -X POST http://localhost:{{ weaviate_port }}/v1/backups/s3
      -H 'Content-Type: application/json'
      -d '{"id":"backup-$(date +\%Y\%m\%d)"}' >> /var/log/weaviate-backup.log 2>&1
    state: "{{ 'present' if weaviate_backup_enabled else 'absent' }}"
  tags: [weaviate, backup]
