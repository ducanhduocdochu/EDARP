replicaCount: 2

image:
  registry: harbor.ducanh.io.vn
  repository: platform-rag-stag/query-service
  tag: "latest"
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: harbor-pull-secret

service:
  type: ClusterIP
  port: 5005

containerPort: 5005

ingress:
  enabled: true
  className: alb
  annotations:
    alb.ingress.kubernetes.io/scheme: internal
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/healthcheck-path: /healthz
  hosts:
    - host: query.platform-rag.internal
      paths:
        - path: /
          pathType: Prefix

resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

env:
  WEAVIATE_URL: ""
  VECTORIZE_URL: "http://embedding-service:5003"
  PROJECT_SERVICE_URL: "http://project-service:5002"
  LLM_API_URL: "http://localhost:11434"
  JWT_SECRET: ""

envFrom:
  - secretRef:
      name: platform-rag-secrets

healthCheck:
  liveness:
    path: /healthz
    port: 5005
    initialDelaySeconds: 10
    periodSeconds: 15
  readiness:
    path: /readyz
    port: 5005
    initialDelaySeconds: 5
    periodSeconds: 10

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70

nodeSelector: {}
tolerations: []
affinity: {}
